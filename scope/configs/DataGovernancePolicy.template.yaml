# DataGovernancePolicy v1 template — A3
#
# T1 is synthetic/public only; these controls still fail closed. Provider,
# region, KMS, retention, incident, and responsible-owner decisions are TBD.

schema_version: 1
policy_id: valere-governance
policy_version: 1
policy_owner: TBD
approval_status: DRAFT
deployment_tier: T1

classification:
  default_level: SYNTHETIC
  privilege_requires_human_confirmation: true
  levels:
    - {id: PUBLIC, rank: 0, description: "Public, rights-cleared data"}
    - {id: SYNTHETIC, rank: 1, description: "Synthetic data with no real-client facts"}
    - {id: CONFIDENTIAL, rank: 2, description: "Confidential data"}
    - {id: PRIVILEGED, rank: 3, description: "Privilege confirmed by an authorized human"}
    - {id: RESTRICTED, rank: 4, description: "Highest restriction"}

labels:
  tenant_required: true
  matter_required: true
  enforcement_point: storage-and-tool-gateway

pii_detection:
  detectors:
    - {name: email, pattern: "\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}\\b"}
    - {name: us-ssn, pattern: "\\b[0-9]{3}-[0-9]{2}-[0-9]{4}\\b"}
  on_detection: UPCLASSIFY_AND_REVIEW

residency:
  allowed_regions: []
  cross_border_transfer: DENY

encryption:
  at_rest: TBD
  in_transit: TBD
  key_provider: TBD
  key_scope: TENANT
  rotation_days: TBD

provider_routes:
  - route_id: TBD
    provider: TBD
    model_id: TBD
    allowed_classifications: [PUBLIC, SYNTHETIC]
    training_disabled: true
    retention_days: TBD
    allowed_regions: []

retention:
  rules:
    - {classification: PUBLIC, days: TBD, disposition: DELETE}
    - {classification: SYNTHETIC, days: TBD, disposition: DELETE}
    - {classification: CONFIDENTIAL, days: TBD, disposition: DELETE}
    - {classification: PRIVILEGED, days: TBD, disposition: DELETE}
    - {classification: RESTRICTED, days: TBD, disposition: DELETE}

legal_hold:
  owner: TBD
  intake: TBD
  release_requires_approval: true
  active_matter_ids: []

dlp_export:
  default: DENY
  approval_action: release-work-product
  allowed_destinations: []

incident_response:
  owner: TBD
  intake_channel: TBD
  containment_sla_minutes: TBD
  breach_assessment_owner: TBD

# All 13 rows are mandatory. Change status to IMPLEMENTED only after the named
# enforcement point exists and the listed tests pass.
control_coverage:
  - {control_id: classification, status: PLANNED, owner: TBD, enforcement_point: scope.governance.classify, test_ids: [test-classification]}
  - {control_id: tenant-isolation, status: PLANNED, owner: TBD, enforcement_point: scope.governance.authorize_tenant_access, test_ids: [test-tenant-isolation]}
  - {control_id: privilege-confirmation, status: PLANNED, owner: TBD, enforcement_point: scope.governance.classify, test_ids: [test-privilege-confirmation]}
  - {control_id: pii-detection, status: PLANNED, owner: TBD, enforcement_point: scope.governance.classify, test_ids: [test-pii]}
  - {control_id: residency, status: PLANNED, owner: TBD, enforcement_point: scope.governance.require_provider_route, test_ids: [test-residency]}
  - {control_id: encryption-at-rest, status: PLANNED, owner: TBD, enforcement_point: integration-adapter, test_ids: [test-encryption-at-rest]}
  - {control_id: encryption-in-transit, status: PLANNED, owner: TBD, enforcement_point: integration-adapter, test_ids: [test-encryption-in-transit]}
  - {control_id: key-management, status: PLANNED, owner: TBD, enforcement_point: integration-adapter, test_ids: [test-key-management]}
  - {control_id: provider-no-training, status: PLANNED, owner: TBD, enforcement_point: scope.governance.require_provider_route, test_ids: [test-provider-routing]}
  - {control_id: retention-deletion, status: PLANNED, owner: TBD, enforcement_point: scope.governance.retention_action, test_ids: [test-retention]}
  - {control_id: legal-hold, status: PLANNED, owner: TBD, enforcement_point: scope.governance.retention_action, test_ids: [test-legal-hold]}
  - {control_id: dlp-export, status: PLANNED, owner: TBD, enforcement_point: scope.governance.require_export, test_ids: [test-dlp]}
  - {control_id: incident-response, status: PLANNED, owner: TBD, enforcement_point: incident-adapter, test_ids: [test-incident]}

approval:
  actor_id: TBD
  role: governance-owner
  approved_at: TBD
