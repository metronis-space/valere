schema_version: 1
policy_id: harvey-ma-pov-governance-001
policy_version: 1
policy_owner: synthetic-legal
approval_status: APPROVED
deployment_tier: T1
classification:
  default_level: SYNTHETIC
  privilege_requires_human_confirmation: true
  levels:
  - id: PUBLIC
    rank: 0
    description: Public, rights-cleared data
  - id: SYNTHETIC
    rank: 1
    description: Synthetic data with no real-client facts
  - id: CONFIDENTIAL
    rank: 2
    description: Confidential data
  - id: PRIVILEGED
    rank: 3
    description: Privilege confirmed by an authorized human
  - id: RESTRICTED
    rank: 4
    description: Highest restriction
labels:
  tenant_required: true
  matter_required: true
  enforcement_point: storage-and-tool-gateway
pii_detection:
  detectors:
  - name: email
    pattern: \b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}\b
  - name: us-ssn
    pattern: \b[0-9]{3}-[0-9]{2}-[0-9]{4}\b
  on_detection: UPCLASSIFY_AND_REVIEW
residency:
  allowed_regions:
  - synthetic-region-1
  cross_border_transfer: DENY
encryption:
  at_rest: AES-256
  in_transit: TLS-1.3
  key_provider: synthetic-kms
  key_scope: TENANT
  rotation_days: 90
provider_routes:
- route_id: synthetic-route
  provider: synthetic-provider
  model_id: synthetic-model-v1
  allowed_classifications:
  - PUBLIC
  - SYNTHETIC
  training_disabled: true
  retention_days: 0
  allowed_regions:
  - synthetic-region-1
retention:
  rules:
  - classification: PUBLIC
    days: 365
    disposition: DELETE
  - classification: SYNTHETIC
    days: 30
    disposition: DELETE
  - classification: CONFIDENTIAL
    days: 30
    disposition: DELETE
  - classification: PRIVILEGED
    days: 30
    disposition: DELETE
  - classification: RESTRICTED
    days: 30
    disposition: DELETE
legal_hold:
  owner: synthetic-legal
  intake: synthetic-legal-hold
  release_requires_approval: true
  active_matter_ids: []
dlp_export:
  default: DENY
  approval_action: release-work-product
  allowed_destinations:
  - synthetic-vdr
incident_response:
  owner: synthetic-legal
  intake_channel: synthetic-security-incidents
  containment_sla_minutes: 30
  breach_assessment_owner: synthetic-legal
control_coverage:
- control_id: classification
  status: IMPLEMENTED
  owner: synthetic-legal
  enforcement_point: synthetic-adapter
  test_ids:
  - test-classification
- control_id: dlp-export
  status: IMPLEMENTED
  owner: synthetic-legal
  enforcement_point: synthetic-adapter
  test_ids:
  - test-dlp-export
- control_id: encryption-at-rest
  status: IMPLEMENTED
  owner: synthetic-legal
  enforcement_point: synthetic-adapter
  test_ids:
  - test-encryption-at-rest
- control_id: encryption-in-transit
  status: IMPLEMENTED
  owner: synthetic-legal
  enforcement_point: synthetic-adapter
  test_ids:
  - test-encryption-in-transit
- control_id: incident-response
  status: IMPLEMENTED
  owner: synthetic-legal
  enforcement_point: synthetic-adapter
  test_ids:
  - test-incident-response
- control_id: key-management
  status: IMPLEMENTED
